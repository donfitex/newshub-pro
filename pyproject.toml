[tool.black]
line-length = 88
target-version = ['py312']

[tool.sort]
profile = 'black'
line-length = 88

[tool.ruff]
line-length = 88
target-version = 'py312'

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
]

ignore = [
    "E501",
]

[tool.ruff.lint.per-file-ignores]
"config/settings/*.py" = ["F403", "F401", "F405", "E402", "I001"]
